<style>

#naac-side-nav .list-group-item:hover {

    padding-left: 1.5rem !important;
}

#naac-side-nav .list-group-item.active {
    background-color: #fff0f3 !important;
    color: #a71836 !important;
    border-left-color: #a71836 !important;
    border-top: none;
    border-right: none;
    border-bottom: 1px solid rgba(0,0,0,.125);
}

#naac-side-nav .list-group-item.active i {
    color: #a71836 !important;
}

.border-transparent {
    border-left-color: transparent !important;
}

.rotate-180 {
    transform: rotate(180deg);
}
</style>

<script>
(function() {
    const currentPath = window.location.pathname;
    const currentPage = currentPath.split('/').pop() || 'naac-aqar.html';
    
    const navItems = document.querySelectorAll('#naac-side-nav .list-group-item');
    const mobileTitle = document.getElementById('activePageTitleMobile');
    const arrow = document.getElementById('naacSidebarArrow');
    const collapseEl = document.getElementById('naacSideNavCollapse');
    const header = document.getElementById('naacSideNavHeader');

    navItems.forEach(link => {
        const linkHref = link.getAttribute('href');
        if (linkHref === currentPage) {
            link.classList.add('active');
            link.classList.remove('border-transparent');
            
            // Update mobile header with active page name
            if (mobileTitle) {
                const text = link.querySelector('span').innerText;
                mobileTitle.innerText = text;
            }
        }
    });

    // Handle arrow rotation toggle
    if (header && arrow) {
        header.addEventListener('click', function() {
            if (window.innerWidth < 992) { // Only on mobile
                arrow.classList.toggle('rotate-180');
            }
        });
    }

    // Reset rotation if closed in some other way (though header is the only trigger)
    if (collapseEl) {
        collapseEl.addEventListener('hidden.bs.collapse', function () {
            arrow.classList.remove('rotate-180');
        });
        collapseEl.addEventListener('shown.bs.collapse', function () {
            arrow.classList.add('rotate-180');
        });
    }
})();
</script>
