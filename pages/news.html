<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College News | National PG College</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    
    
    <link rel="stylesheet" href="../assets/css/style.css">

    <style>
        .hero-section {
            background: url('../assets/images/news-hero.jpeg') no-repeat center center/cover !important;
        }
        .gallery-item {
    cursor: pointer;
    overflow: hidden;
}

.gallery-item img {
    transition: 0.3s;
}

.gallery-item:hover img {
    transform: scale(1.05);
}

.hover-overlay {
    transition: 0.3s;
}

.gallery-item:hover .hover-overlay {
    opacity: 1 !important;
}
    </style>
</head>

<body>
    <div id="navbar-placeholder"></div>

    <header class="hero-section">
        <div class="gradient-overlay-v"></div>

        <div class="container text-center text-white position-relative z-3">
            <span class="badge rounded-pill bg-danger px-3 py-2 mb-4 tracking-widest text-xs uppercase shadow-sm">
                Latest • Updates • Events
            </span>

            <h1 class="main-title fw-black text-uppercase mb-3">
                College<br>News
            </h1>

            <p class="lead mx-auto mb-5 opacity-75 main-description">
                Stay connected with the vibrant life at National PG College. Explore our gallery of recent achievements, events, and campus milestones.
            </p>

            <div class="d-flex justify-content-center gap-3 mb-5 pb-5">
                <a href="#news" class="btn btn-menu btn-lg px-5 py-3 fw-bold">
                    Explore Gallery
                </a>
            </div>
        </div>
    </header>

    <div class="news-section" id="news">
        <div class="container news-container">
            
           <div class="text-center mb-5 reveal">
                <span class="sec-label">News & Updates</span>
                <h2 class="sec-h">College News</h2>
                <div class="sec-stripe"></div>
            </div>

            <!-- February 2025 -->
           <div class="container py-5">

             <div class="mb-5">
        <h4 class="mb-3 border-start border-danger ps-3">April 2025</h4>

        <div class="row g-3">

            <div class="col-6 col-md-4 col-lg-3">
                <div class="gallery-item position-relative"
                     data-hd="../assets/images/news-hero.jpeg"
                     data-caption="News Brief - February 7, 2025">

                    <img src="../assets/images/news-hero.jpeg"
                         class="img-fluid rounded w-100" alt="News">

                    <div class="position-absolute top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center bg-dark bg-opacity-50 opacity-0 hover-overlay">
                        <i class="fa-solid fa-expand text-white fs-4"></i>
                    </div>

                </div>
            </div>

        </div>
    </div>


    <!-- February 2025 -->
    <div class="mb-5">
        <h4 class="mb-3 border-start border-danger ps-3">February 2025</h4>

        <div class="row g-3">

            <div class="col-6 col-md-4 col-lg-3">
                <div class="gallery-item position-relative"
                     data-hd="../assets/images/dustbin-news.jpeg"
                     data-caption="News Brief - February 7, 2025">

                    <img src="../assets/images/dustbin-news.jpeg"
                         class="img-fluid rounded w-100" alt="News">

                    <div class="position-absolute top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center bg-dark bg-opacity-50 opacity-0 hover-overlay">
                        <i class="fa-solid fa-expand text-white fs-4"></i>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- January 2025 -->
    <div class="mb-5">
        <h4 class="mb-3 border-start border-danger ps-3">January 2025</h4>

        <div class="row g-3">

            <div class="col-6 col-md-4 col-lg-3">
                <div class="gallery-item position-relative"
                     data-hd="https://www.npgc.in/Assets/News/28_01_2025_2054.jpg"
                     data-caption="News Brief - January 28, 2025">

                    <img src="https://www.npgc.in/Assets/News/Thumb/28_01_2025_2054.jpg"
                         class="img-fluid rounded w-100" alt="News">

                    <div class="position-absolute top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center bg-dark bg-opacity-50 opacity-0 hover-overlay">
                        <i class="fa-solid fa-expand text-white fs-4"></i>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- December 2021 -->
    <div class="mb-5">
        <h4 class="mb-3 border-start border-danger ps-3">December 2021</h4>

        <div class="row g-3">

            <div class="col-6 col-md-4 col-lg-3">
                <div class="gallery-item position-relative"
                     data-hd="https://www.npgc.in/Assets/News/14_12_2021_2052.jpg"
                     data-caption="Event Highlight - Dec 14, 2021">

                    <img src="https://www.npgc.in/Assets/News/Thumb/14_12_2021_2052.jpg"
                         class="img-fluid rounded w-100" alt="News">

                    <div class="position-absolute top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center bg-dark bg-opacity-50 opacity-0 hover-overlay">
                        <i class="fa-solid fa-expand text-white fs-4"></i>
                    </div>

                </div>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <div class="gallery-item position-relative"
                     data-hd="https://www.npgc.in/Assets/News/14_12_2021_2053.jpg"
                     data-caption="Campus Update - Dec 14, 2021">

                    <img src="https://www.npgc.in/Assets/News/Thumb/14_12_2021_2053.jpg"
                         class="img-fluid rounded w-100" alt="News">

                    <div class="position-absolute top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center bg-dark bg-opacity-50 opacity-0 hover-overlay">
                        <i class="fa-solid fa-expand text-white fs-4"></i>
                    </div>

                </div>
            </div>

        </div>
    </div>

</div>
</div>
<!-- ✅ Lightbox -->
<div id="lightboxOverlay"
     class="position-fixed top-0 start-0 w-100 h-100 bg-dark bg-opacity-75 d-none justify-content-center align-items-center"
     style="z-index:1050;">

    <div class="position-relative bg-white p-2 rounded">

        <!-- Close button -->
        <span id="closeLightbox"
      class="position-absolute bg-dark text-white rounded-circle p-2 top-0 end-0 m-2 fs-4"
      style="cursor:pointer; line-height:1;">
    ✕
</span>

        <!-- Image -->
        <img id="lightboxImg" class="img-fluid rounded" style="max-height:80vh;">
    </div>
</div>
</div>

<div id="footer-placeholder"></div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/loadcomponents.js"></script>
    <script src="../assets/js/main.js"></script>
</body>

</html>
